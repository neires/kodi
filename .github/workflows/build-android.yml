name: 🔨 Build Kodi 22 Neires Edition (armeabi-v7a)

on:
  workflow_dispatch:

env:
  TARGET_ARCH: arm-linux-androideabi
  NDK_API_LEVEL: 24
  ANDROID_PLATFORM: android-34
  NDK_VERSION: "28.2.13676358"
  PYTHON_VERSION: "3.11"

  APP_NAME: "Kodi 22 Neires"
  PACKAGE_NAME: "net.kodimod.neires.kodi22"
  FINAL_APK_NAME: "kodi22-neires-edition-armeabi-v7a.apk"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Fork mit Submodulen
      uses: actions/checkout@v4
      with:
        submodules: recursive
        ref: 22-android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies (inkl. Emacs)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool curl gawk gperf unzip zlib1g-dev \
          libncurses5-dev liblzo2-dev libjpeg-dev libpcre3-dev libgif-dev \
          libfreetype6-dev libdbus-1-dev libdbus-glib-1-dev libasound2-dev \
          libsqlite3-dev libxslt1-dev libxml2-dev libcap-dev libfontconfig1-dev \
          libglu1-mesa-dev python3-dev python3-setuptools python3-distutils \
          swig git-core ant ant-optional wget libcurl4-openssl-dev \
          libssl-dev ninja-build cmake bison flex gettext texinfo yasm \
          nasm meson patchelf emacs-nox

    - name: Ensure emacs is on PATH
      run: |
        if ! command -v emacs >/dev/null 2>&1; then
          if command -v emacs-nox >/dev/null 2>&1; then
            sudo ln -s "$(command -v emacs-nox)" /usr/local/bin/emacs
          fi
        fi

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
        echo "ANDROID_NDK=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

    - name: Cache Kodi Dependencies (NEUER KEY)
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/xbmc-depends
        key: ${{ runner.os }}-kodi-depends-v4-${{ hashFiles('tools/depends/Makefile') }}

    - name: Build all dependencies (Kodi regelt Compiler selbst)
      run: |
        cd tools/depends
        ./bootstrap
        # KEINE manuellen CC/CXX/CFLAGS Exporte!
        ./configure --prefix=${{ github.workspace }}/xbmc-depends \
                    --with-tarballs=${{ github.workspace }}/.tarballs \
                    --host=${{ env.TARGET_ARCH }} \
                    --with-sdk-path=$ANDROID_HOME \
                    --with-ndk-path=$ANDROID_NDK \
                    --with-rendersystem=gles
        make -j$(nproc)

    - name: Paketnamen hartcodieren
      run: |
        sed -i 's/set(APP_PACKAGE "[^"]*"/set(APP_PACKAGE "${{ env.PACKAGE_NAME }}"/' CMakeLists.txt
        sed -i 's/set(APP_NAME "[^"]*"/set(APP_NAME "${{ env.APP_NAME }}"/' CMakeLists.txt

    - name: Build Kodi & Package APK
      run: |
        make -C tools/depends/target/cmakebuildsys
        cd build
        export GRADLE_OPTS="-Xmx2048m"
        make -j$(nproc)
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        make apk

    - name: APK umbenennen und hochladen
      run: |
        APK_FILE=$(find . -name "*.apk" -type f | head -1)
        mv "$APK_FILE" "${{ env.FINAL_APK_NAME }}"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.FINAL_APK_NAME }}
        path: ${{ env.FINAL_APK_NAME }}
        retention-days: 30
